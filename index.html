<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YATEDARTS | Clasificación Grupo 030</title>
    <style>
        :root { --primary: #ff4d4d; --accent: #00d4ff; --gold: #ffd700; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; color: white;
            background: #0b0b14; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden;
        }
        .wallpaper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('pub_yatedigo.jpg') no-repeat center center;
            background-size: cover; z-index: -2; filter: brightness(0.4) blur(4px);
        }
        .container {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px);
            padding: 40px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; width: 90%; max-width: 600px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 1s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 2.5rem; margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; }
        .league-status { color: var(--accent); font-weight: 800; font-size: 1.2rem; margin-bottom: 30px; }
        .ranking-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .rank-item { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .rank-item strong { display: block; font-size: 2rem; color: var(--gold); }
        .btn-enter {
            background: var(--primary); color: white; border: none; padding: 20px 40px;
            border-radius: 50px; font-size: 1.2rem; font-weight: 900; cursor: pointer;
            transition: 0.3s; text-decoration: none; display: inline-block;
            box-shadow: 0 0 20px var(--primary); text-transform: uppercase;
        }
        .btn-enter:hover { transform: scale(1.05); box-shadow: 0 0 40px var(--primary); }
    </style>
</head>
<body>
    <div class="wallpaper"></div>
    <audio id="dardoSound"><source src="dardo.mp3" type="audio/mpeg"></audio>
    <div class="container">
        <h1>YATEDARTS</h1>
        <div class="league-status">LIGA EQUIPOS 2026 · GRUPO 030</div>
        
        <div class="ranking-box">
            <div class="rank-item">
                <span>POSICIÓN EQUIPO</span>
                <strong>#2</strong>
            </div>
            <div class="rank-item">
                <span>ESTADO</span>
                <span style="color:var(--success); font-weight: 900; display: block; font-size: 1.5rem;">CO-LÍDER</span>
            </div>
        </div>

        <div style="margin-bottom: 40px; font-size: 0.9rem; opacity: 0.8;">
            <p>RANKING INDIVIDUAL J4:</p>
            <span style="margin: 0 10px;">José Alejandro: <b>#20</b></span>
            <span style="margin: 0 10px;">Roberto: <b>#33</b></span>
        </div>

        <a href="warroom.html" class="btn-enter" onclick="document.getElementById('dardoSound').play()">ENTRAR AL WAR ROOM</a>
    </div>
</body>
</html>
