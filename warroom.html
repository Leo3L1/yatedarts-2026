<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YATEDARTS | War Room J4</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root { --primary: #ff4d4d; --accent: #00d4ff; --gold: #ffd700; --success: #4ade80; }
        body { font-family: 'Inter', sans-serif; color: white; background: #0b0b14; margin: 0; }
        .wallpaper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('pub_yatedigo.jpg') no-repeat center center; background-size: cover; z-index: -2; filter: brightness(0.3) blur(10px); }
        .navbar { background: rgba(10, 10, 20, 0.85); backdrop-filter: blur(20px); padding: 12px; display: flex; gap: 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--primary); overflow-x: auto; scrollbar-width: none; }
        .nav-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--primary); color: white; padding: 10px 20px; border-radius: 40px; font-weight: 900; cursor: pointer; flex-shrink: 0; text-transform: uppercase; font-size: 0.8rem; }
        .nav-btn.active { background: var(--primary); box-shadow: 0 0 15px var(--primary); }
        .container { width: 95%; max-width: 1300px; margin: 25px auto; }
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px); border-radius: 35px; padding: 30px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .mvp-badge { background: linear-gradient(45deg, var(--gold), #ff4d4d); padding: 25px; border-radius: 50px; text-align: center; font-weight: 950; font-size: 1.4rem; margin-bottom: 30px; border: 3px solid #fff; animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.02); } }
        .player-chip { background: rgba(0,0,0,0.5); padding: 12px 22px; border-radius: 40px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); font-weight: 800; white-space: nowrap; margin-right: 10px; }
        .player-chip.selected { border-color: var(--accent); background: rgba(0,212,255,0.2); }
        .motivation-box { line-height: 1.8; padding: 25px; border-left: 6px solid var(--primary); background: rgba(0,0,0,0.3); border-radius: 0 25px 25px 0; }
    </style>
</head>
<body onclick="startAudio()">
    <div class="wallpaper"></div>
    <audio id="bgMusic" loop><source src="dartstema.mp3" type="audio/mpeg"></audio>
    <audio id="dardoSound"><source src="dardo.mp3" type="audio/mpeg"></audio>

    <div class="navbar">
        <button class="nav-btn active" onclick="openTab('perfiles'); playDardo()">👤 Perfiles J4</button>
        <button class="nav-btn" onclick="openTab('clasificacion'); playDardo()">🏆 Clasificación</button>
        <button class="nav-btn" onclick="openTab('scouting'); playDardo()">⚔️ War Room J5</button>
    </div>

    <div class="container">
        <div id="perfiles" class="tab-content active">
            <div class="mvp-badge">🏆 TOP #20 RANKING GENERAL: JOSÉ ALEJANDRO 🏆</div>
            <div style="display:flex; overflow-x:auto; padding-bottom:15px; margin-bottom:20px;" id="playerList"></div>
            
            <div id="singlePlayerContent" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px;">
                <div class="card">
                    <h2 id="pName" style="color: var(--accent); margin-top:0;">Jugador</h2>
                    <div style="display: flex; gap: 15px; margin: 20px 0;">
                        <div style="background: rgba(0,0,0,0.5); padding: 20px; border-radius: 20px; flex:1; text-align:center;">
                            <span style="font-size: 0.75rem; color: var(--accent);">PPD</span>
                            <strong id="pPPD" style="font-size: 2rem; display: block;">-</strong>
                        </div>
                        <div style="background: rgba(0,0,0,0.5); padding: 20px; border-radius: 20px; flex:1; text-align:center;">
                            <span style="font-size: 0.75rem; color: var(--accent);">MPR</span>
                            <strong id="pMPR" style="font-size: 2rem; display: block;">-</strong>
                        </div>
                    </div>
                    <canvas id="radarChart"></canvas>
                </div>
                <div class="card">
                    <h3>🎖️ Informe de Situación</h3>
                    <div id="pMotivation" class="motivation-box"></div>
                </div>
            </div>
        </div>

        <div id="clasificacion" class="tab-content" style="display:none;">
            <div class="card">
                <h2>Estado de Liga - Jornada 4</h2>
                <p>Mantenemos la <b>2ª posición</b> con 8 puntos, empatados con el líder.</p>
                <div style="background: rgba(0,212,255,0.1); padding: 20px; border-radius: 20px; margin-top: 20px;">
                    <p>Pegada del Equipo (J1-J4): <b>60 Low Tons</b> acumulados.</p>
                    <p>Media Combinada: <b>51.14</b></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const players = [
            { name: "José Alejandro", ppd: 27.66, mpr: 2.94, rank: 20, color: "#00d4ff", motivation: "<b>EL LÍDER DEL CLUB.</b> José, ocupas el <b>puesto #20</b> del ranking individual. Eres el jugador con el MPR más equilibrado de la plantilla (2.94). Tu papel para la J5 es frenar el avance del rival en el primer individual de Cricket." },
            { name: "Agustín Díaz", ppd: 28.11, mpr: 2.68, rank: 11, color: "#ff4d4d", motivation: "<b>EL REY DE LA PEGADA.</b> Agustín, con **22 Low Tons**, eres el máximo artillero. En el 501 nadie te tose. Puesto #11 del grupo." },
            { name: "Roberto Lorente", ppd: 23.44, mpr: 2.19, rank: 33, color: "#fbbf24", motivation: "<b>EL MURO.</b> Roberto, en el <b>puesto #33</b>, tu solidez en los momentos de presión es fundamental. Has demostrado que puedes puntuar alto cuando el partido se aprieta." }
        ];

        let chart;
        function playDardo() { const s = document.getElementById('dardoSound'); s.currentTime = 0; s.play(); }
        function startAudio() { const m = document.getElementById('bgMusic'); if(m.paused){ m.volume = 0.2; m.play(); } }

        function updateDashboard(idx) {
            const p = players[idx];
            document.querySelectorAll('.player-chip').forEach(c => c.classList.remove('selected'));
            document.getElementById(`chip-${idx}`).classList.add('selected');
            document.getElementById('pName').innerText = p.name + " (#" + p.rank + ")";
            document.getElementById('pPPD').innerText = p.ppd.toFixed(2);
            document.getElementById('pMPR').innerText = p.mpr.toFixed(2);
            document.getElementById('pMotivation').innerHTML = p.motivation;

            if(chart) chart.destroy();
            chart = new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: { labels: ['PPD', 'MPR', 'PEGADA', 'CIERRE', 'RITMO'], datasets: [{ data: [p.ppd, p.mpr*10, 80, 70, 90], borderColor: p.color, backgroundColor: p.color + '33' }] },
                options: { scales: { r: { grid: { color: '#444' }, pointLabels: { color: '#fff' }, ticks: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        const list = document.getElementById('playerList');
        players.forEach((p, i) => {
            const ch = document.createElement('div'); ch.className = 'player-chip'; ch.id = `chip-${i}`; ch.innerText = p.name;
            ch.onclick = () => { updateDashboard(i); playDardo(); };
            list.appendChild(ch);
        });

        function openTab(id) { 
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none'); 
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block'; 
            event.currentTarget.classList.add('active'); 
        }

        window.onload = () => updateDashboard(0);
    </script>
</body>
</html>
